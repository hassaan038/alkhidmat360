services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: alkhidmat-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: alkhidmat360
    ports:
      - "3307:3306" # Expose on 3307 to avoid conflicts with local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - alkhidmat-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpassword",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Server (Backend)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: alkhidmat-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env.docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    networks:
      - alkhidmat-network
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node src/server.js"

  # Client (Frontend)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: alkhidmat-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    env_file:
      - ./client/.env.docker
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    networks:
      - alkhidmat-network

networks:
  alkhidmat-network:
    name: alkhidmat-network
    driver: bridge

volumes:
  mysql_data:
    name: alkhidmat-mysql-data
